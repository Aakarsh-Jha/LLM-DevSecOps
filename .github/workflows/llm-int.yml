name: Comment security issues from git diff on PR to main

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  analyze-code:
    name: Hybrid Security Analysis (Static + LLM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Python static scanner
        run: python scanner.py

      - name: Analyze git diff and filter with Gemini
        uses: actions/github-script@v6
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const https = require('https');
            const fs = require('fs');

            const pr = context.payload.pull_request;
            if (!pr) {
              console.log('No pull_request found in context; skipping.');
              return;
            }

            const base = pr.base.sha;
            const head = pr.head.sha;

            let diff = '';
            try {
              diff = execSync(`git diff --unified=1 ${base} ${head}`, { encoding: 'utf-8', maxBuffer: 1024 * 1000 });
            } catch (error) {
              diff = `Error generating diff: ${error.message}`;
            }

            // Read the findings from your Python static scanner file
            let staticFindings = '';
            try {
              staticFindings = fs.readFileSync('static_findings.txt', 'utf-8');
            } catch (err) {
              staticFindings = 'No static scanner data available.';
            }

            // Create a hybrid prompt that enforces semantic filtering
            const prompt = `You are a DevSecOps code reviewer. Your job is to act as a semantic reasoning layer filtering the results of a basic regex scanner.
            
            Here are the rule-based findings from our static scanner:
            ${staticFindings}

            Here is the raw git diff:
            ${diff}

            Analyze the findings and the diff context. Ignore false positives (like commented out code or safe variable strings). If actual valid vulnerabilities exist, list them in Markdown format using this exact structure:
            ### ⚠️ [Vulnerability Name]
            **Risk Level:** [LOW | MEDIUM | HIGH | CRITICAL]
            **Description:** [Contextual explanation]
            **Fix:** [Recommended correction].
            
            If no actual security threats exist or everything flagged is a false positive, respond with: "Clean code – no security issues detected."`;

            const apiKey = process.env.GOOGLE_API_KEY;
            const requestData = JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { temperature: 0.2 }
            });

            const options = {
              hostname: 'generativelanguage.googleapis.com',
              path: `/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${apiKey}`,
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(requestData)
              }
            };

            const response = await new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              req.on('error', reject);
              req.write(requestData);
              req.end();
            });

            const reply = response?.candidates?.[0]?.content?.parts?.[0]?.text || 'No response from Gemini';

            // Clean up literal '\n' text strings so markdown renders beautifully
            const cleanReply = reply.replace(/\\n/g, '\n');

            // Post report directly to the PR comments
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `### DevSecOps Hybrid Scan Report\n\n${cleanReply}`
            });

            // BULLETPROOF MATCH: Simply check if the text contains the bare words HIGH or CRITICAL
            const hasHighOrCritical = /CRITICAL|HIGH/i.test(cleanReply);

            if (hasHighOrCritical) {
               console.log("❌ Quality Gate Failed: Severe security flaws verified by the hybrid engine.");
               process.exit(1); // Forces the GitHub Action to turn RED and block the merge!
            } else {
               console.log("✅ Quality Gate Passed: Code base cleared of severe vulnerabilities.");
               process.exit(0);
            }